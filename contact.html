<!DOCTYPE html>
<html>
<head>
<title>Contact</title>

<link rel="stylesheet" href="style.css">

<!-- ICONS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="logo">Goutam</div>
    <div class="nav-links">
        <a href="index.html"><i class="fa fa-home"></i> Home</a>
        <a href="about.html"><i class="fa fa-user"></i> About</a>
        <a href="education.html"><i class="fa fa-graduation-cap"></i> Education</a>
        <a href="skills.html"><i class="fa fa-brain"></i> Skills</a>
        <a href="projects.html"><i class="fa fa-code"></i> Projects</a>
        <a href="experience.html"><i class="fa fa-briefcase"></i> Experience</a>
        <a href="contact.html"><i class="fa fa-envelope"></i> Contact</a>
    </div>
</nav>

<section class="page-section">

<div class="glass-card full">

<h2>Contact Me</h2>

<!-- CONTACT BUTTONS -->
<div class="contact-links">

<div class="contact-btn" onclick="sendMail()">
<i class="fa fa-envelope"></i> Email Me
</div>

<div class="contact-btn" onclick="copyEmail()">
<i class="fa fa-copy"></i> Copy Email
</div>

<div class="contact-btn" onclick="openLinkedIn()">
<i class="fab fa-linkedin"></i> LinkedIn
</div>

<div class="contact-btn" onclick="openGitHub()">
<i class="fab fa-github"></i> GitHub
</div>

<div class="contact-btn" onclick="openWhatsApp()">
<i class="fab fa-whatsapp"></i> WhatsApp
</div>

</div>

<!-- CONTACT FORM -->
<form class="contact-form" onsubmit="submitForm(event)">

<input type="text" placeholder="Your Name" required>
<input type="email" placeholder="Your Email" required>
<textarea placeholder="Your Message" required></textarea>

<button type="submit">Send Message</button>

</form>

<p id="msg"></p>

</div>
</section>

<!-- FLOATING SOCIAL BAR -->
<div class="social-bar">
<i class="fab fa-linkedin" onclick="openLinkedIn()"></i>
<i class="fab fa-github" onclick="openGitHub()"></i>
<i class="fab fa-whatsapp" onclick="openWhatsApp()"></i>
</div>

<script>

function sendMail(){
window.location.href="mailto:goutamittam207@gmail.com";
}

function copyEmail(){
navigator.clipboard.writeText("goutamittam207@gmail.com");
alert("Email copied!");
}

function openLinkedIn(){
window.open("https://linkedin.com/in/omkar-ittam-3b915b3ba","_blank");
}

function openGitHub(){
window.open("https://github.com/goutamittam","_blank");
}

function openWhatsApp(){
window.open("https://wa.me/919970234848","_blank"); // add your number
}

function submitForm(e){
e.preventDefault();
document.getElementById("msg").innerText = "Message sent successfully!";
}

</script>

</body>
</html>
